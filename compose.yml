services:
  deps:
    build:
      context: .
      target: dev
    command: bun install --frozen-lockfile
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - bun_cache:/root/.bun/install/cache

  server:
    build:
      context: .
      target: dev
    command: bun run dev:server
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@db:5432/tilezo
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - bun_cache:/root/.bun/install/cache
    depends_on:
      deps:
        condition: service_completed_successfully
      db:
        condition: service_healthy

  client:
    build:
      context: .
      target: dev
    command: bun run dev:client
    environment:
      PUBLIC_WS_URL: ws://localhost:3000/ws
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - bun_cache:/root/.bun/install/cache
    depends_on:
      deps:
        condition: service_completed_successfully
      server:
        condition: service_started

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: tilezo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tilezo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bun_cache:
  node_modules:
  postgres_data:
